# =============================================================
# Application Configuration - AI Internship Recommendation Engine
# =============================================================

spring.application.name=AI-Internship-Recommendation-Engine

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# MySQL DataSource
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/internship_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================================
# NVIDIA NIM API
# ============================================================
nvidia.api.key=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
nvidia.api.url=https://integrate.api.nvidia.com/v1/chat/completions
nvidia.api.model=meta/llama-3.1-8b-instruct

# ============================================================
# Recommendation Engine Parameters
# ============================================================
recommendation.top-n=5
recommendation.min-score=20.0

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ============================================================
# Logging
# ============================================================
logging.level.com.internship.recommendation=DEBUG
logging.level.org.springframework.cache=DEBUG
logging.level.org.hibernate.SQL=DEBUG
